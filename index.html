<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Currency Converter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #22223a;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.3);
      --text: #e8e8f0;
      --text-dim: #8888a0;
      --border: #2a2a44;
      --green: #4ade80;
      --red: #f87171;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px 16px 100px;
    }

    header {
      text-align: center;
      padding: 24px 0 20px;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header p {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 4px;
    }

    .input-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .amount-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .amount-input-wrap {
      flex: 1;
      position: relative;
    }

    .amount-input-wrap label,
    .currency-select-wrap label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-weight: 600;
    }

    #amount {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 28px;
      font-weight: 700;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #amount:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .currency-select-wrap {
      width: 110px;
    }

    #fromCurrency {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      padding: 12px 10px;
      cursor: pointer;
      outline: none;
      appearance: none;
      text-align: center;
      height: calc(100% - 23px);
      margin-top: auto;
    }

    .swap-row {
      display: flex;
      justify-content: center;
      margin: -6px 0;
      position: relative;
      z-index: 2;
    }

    #swapBtn {
      background: var(--surface2);
      border: 2px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s, background 0.2s;
    }

    #swapBtn:active { transform: rotate(180deg); background: var(--accent); }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding: 0 4px;
    }

    .results-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    #lastUpdated {
      font-size: 11px;
      color: var(--text-dim);
    }

    .results-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: transform 0.15s;
      cursor: pointer;
    }

    .result-card:active {
      transform: scale(0.98);
    }

    .result-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .result-flag {
      font-size: 28px;
      line-height: 1;
    }

    .result-code {
      font-size: 16px;
      font-weight: 700;
    }

    .result-name {
      font-size: 12px;
      color: var(--text-dim);
    }

    .result-right {
      text-align: right;
    }

    .result-value {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .result-rate {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-dim);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 10px;
      padding: 14px;
      color: var(--red);
      font-size: 13px;
      text-align: center;
    }

    .manage-row {
      text-align: center;
      margin-top: 12px;
    }

    #manageCurrencies {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    #manageCurrencies:active { background: var(--surface2); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      max-height: 75dvh;
      overflow-y: auto;
      padding: 20px 16px 40px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .modal p {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .modal-search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 14px;
      outline: none;
      margin-bottom: 12px;
    }

    .modal-search:focus { border-color: var(--accent); }

    .currency-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .currency-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      border: none;
      background: none;
      color: var(--text);
      width: 100%;
      text-align: left;
      font-size: 15px;
    }

    .currency-option:active { background: var(--surface2); }

    .currency-option .flag { font-size: 24px; }
    .currency-option .code { font-weight: 700; min-width: 40px; }
    .currency-option .name { color: var(--text-dim); font-size: 13px; flex: 1; }

    .currency-option .check {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .currency-option.selected .check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .modal-done {
      position: sticky;
      bottom: 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      width: 100%;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
    }

    @media (min-width: 500px) {
      .app { padding: 40px 24px 100px; }
      header h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Currency Converter</h1>
      <p id="lastUpdated">Fetching rates...</p>
    </header>

    <div class="input-card">
      <div class="amount-row">
        <div class="amount-input-wrap">
          <label for="amount">Amount</label>
          <input type="number" id="amount" inputmode="decimal" value="1" min="0" step="any" autocomplete="off">
        </div>
        <div class="currency-select-wrap">
          <label for="fromCurrency">From</label>
          <select id="fromCurrency"></select>
        </div>
      </div>
    </div>

    <div class="results-header">
      <h2>Converted to</h2>
    </div>

    <div id="results" class="results-list">
      <div class="loading">
        <div class="spinner"></div>
        Loading exchange rates...
      </div>
    </div>

    <div class="manage-row">
      <button id="manageCurrencies">Manage currencies</button>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2>Select currencies</h2>
      <p>Choose which currencies to show</p>
      <input type="text" class="modal-search" id="modalSearch" placeholder="Search currencies...">
      <div class="currency-list" id="currencyList"></div>
      <button class="modal-done" id="modalDone">Done</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
